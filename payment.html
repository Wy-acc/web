<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menus Energy Cafe</title>
        <link href="image/Logo.png" rel="shortcut icon"/>
        <link href="payment.css" rel="stylesheet"/>
        
    </head>

    <body>
        <h1>My list</h1>
        <table id="cart-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Cart items will be dynamically added here -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align: right;">Total:</td>
                    <td id="total-price">$0.00</td>
                </tr>
            </tfoot>
        </table>

        <button>Pay now</button>
        <!--display form on screen after press pay now-->
        <div class="container"> 

            <form action="#"> 
    
                <div class="row"> 
    
                    <div class="col"> 
                        <h3 class="title">Payment</h3> 
    
                        <div class="inputBox"> 
                            <label>Name on Card: </label> 
                            <input type="text" placeholder="Enter card name" required> 
                        </div>
                        
                        <div class="inputBox"> 
                            <label>Payment Method:</label> 
                            <select> 
                                <option>Choose payment method</option> 
                                <option value="Visa">VISA</option> 
                                <option value="MasterCard">MasterCard</option> 
                                <option value="PayPal">PayPal</option> 
                                
                            </select> 
                        </div> 
    
                        <div class="inputBox"> 
                            <label for="cardNum"> Card Number: </label> 
                            <input type="text" id="cardNum" placeholder="1111-2222-3333-4444" pattern="[0-9]{4}-[0-9]{4}-[0-9]{4}-[0-9]{4}" 
                            maxlength="19" required> 
                        </div> 
    
                        <div class="inputBox"> 
                            <label>Expire Month:</label> 
                            <select> 
                                <option>Choose month</option> 
                                <option value="January">January</option> 
                                <option value="February">February</option> 
                                <option value="March">March</option> 
                                <option value="April">April</option> 
                                <option value="May">May</option> 
                                <option value="June">June</option> 
                                <option value="July">July</option> 
                                <option value="August">August</option> 
                                <option value="September">September</option> 
                                <option value="October">October</option> 
                                <option value="November">November</option> 
                                <option value="December">December</option> 
                            </select> 
                        </div> 
    
                        <div class="flex"> 
                            <div class="inputBox"> 
                                <label>Expire Year:</label> 
                                <select> 
                                    <option>Choose Year</option> 
                                    <option value="2023">2023</option> 
                                    <option value="2024">2024</option> 
                                    <option value="2025">2025</option> 
                                    <option value="2026">2026</option> 
                                    <option value="2027">2027</option> 
                                </select> 
                            </div> 
    
                            <div class="inputBox"> 
                                <label>CVV</label> 
                                <input type="number" placeholder="1234" maxlength="999" required> 
                            </div> 
                        </div> 
    
                    </div> 
    
                </div> 
    
                <input type="submit" value="Checkout" class="submit_btn"> 
            </form> 
    
        </div>

    <script src="shopcart.js"></script>
    <script src="payment.js"></script>
    </body>

    </html>
